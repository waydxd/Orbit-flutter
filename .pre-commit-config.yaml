# Pre-commit configuration for Orbit-flutter
# Install pre-commit: https://pre-commit.com/
# Enable hooks: pre-commit install && pre-commit install --hook-type pre-push
# Run all hooks manually: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: dart-format
        name: Dart format
        entry: dart format --set-exit-if-changed .
        language: system
        files: '\.dart$'
        stages: [commit]

      - id: flutter-analyze
        name: Flutter analyze
        entry: flutter analyze --no-fatal-infos --no-fatal-warnings --fail-on-severe
        language: system
        files: '\.dart$'
        stages: [commit]

      - id: flutter-test
        name: Flutter tests (run on push)
        entry: bash -lc 'flutter test --coverage'
        language: system
        files: '\.dart$'
        stages: [push]

