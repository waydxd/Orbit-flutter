# Workflow: Build Android APK and publish to GitHub Release (for F-Droid)
# Triggers on push to tags like v1.2.3 and on manual dispatch.
# - Builds a release APK with Flutter
# - Optionally decodes a keystore from secrets to sign the APK
# - Creates/updates a GitHub Release and uploads the APK asset

name: android-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write # needed to create releases and upload assets

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - run: flutter --version

      - name: Set up JDK (for Gradle)
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Android keystore
        run: |
          mkdir -p android/app
          echo "Decoding keystore to android/app/keystore.jks"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Write android/key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=app/keystore.jks
          EOF

      - name: Show Java and Flutter versions
        run: |
          java -version
          flutter --version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build release APK (universal)
        run: flutter build apk --release

      - name: List produced APKs
        run: ls -l build/app/outputs/flutter-apk || true

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: "Release ${{ github.ref_name }} — APK for F-Droid"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/app/outputs/flutter-apk/app-release.apk
          asset_name: app-${{ github.ref_name }}.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Warn if keystore was not provided
        run: |
          echo "WARNING: ANDROID_KEYSTORE_BASE64 secret not set. Uploaded APK will be unsigned (or signed with debug key) and not suitable for production/F-Droid installs."

